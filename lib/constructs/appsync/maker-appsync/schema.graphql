# =====================================================
# QUERIES
# =====================================================
type Query @aws_cognito_user_pools {
  # Profile queries
  getMakerProfile: MakerProfile
  getPublicMakerProfile(userId: ID!): MakerProfile
  getMakerSettings: MakerSettings
  getVerificationStatus: MakerVerificationStatus
  
  # Operations queries
  getOperations(weekDate: String!): BusinessOperations
  getCurrentOperations: BusinessOperations
  
  # Craft Heritage queries
  listCraftHeritage(limit: Int, nextToken: String): CraftHeritageConnection
  getCraftHeritage(heritageId: ID!): CraftHeritage
}

# =====================================================
# MUTATIONS
# =====================================================
type Mutation @aws_cognito_user_pools {
  # Profile mutations
  setupMakerProfile(input: SetupMakerProfileInput!): MakerProfile
  updateMakerProfile(input: UpdateMakerProfileInput!): MakerProfile
  updateSkills(input: UpdateSkillsInput!): MakerProfile
  updateMakerSettings(input: UpdateMakerSettingsInput!): MakerSettings
  
  # Operations mutations
  setupOperations(input: SetupOperationsInput!): BusinessOperations
  updateOperations(input: UpdateOperationsInput!): BusinessOperations
  setVacationMode(input: SetVacationModeInput!): BusinessOperations
  
  # Craft Heritage mutations
  addCraftHeritage(input: AddCraftHeritageInput!): CraftHeritage
  updateCraftHeritage(input: UpdateCraftHeritageInput!): CraftHeritage
  deleteCraftHeritage(heritageId: ID!): Boolean
}

# =====================================================
# SUBSCRIPTIONS
# =====================================================
type Subscription @aws_cognito_user_pools {
  onMakerProfileUpdated(userId: ID!): MakerProfile
    @aws_subscribe(mutations: ["setupMakerProfile", "updateMakerProfile", "updateSkills"])
  onOperationsUpdated(makerUserId: ID!): BusinessOperations
    @aws_subscribe(mutations: ["setupOperations", "updateOperations", "setVacationMode"])
}

# =====================================================
# ENUMS
# =====================================================
enum VerificationStatus {
  UNVERIFIED
  PENDING
  VERIFIED
  REJECTED
  SUSPENDED
}

enum BusinessType {
  INDIVIDUAL
  SOLE_PROPRIETORSHIP
  LLC
  CORPORATION
}

enum Workload {
  LIGHT
  MODERATE
  HEAVY
  AT_CAPACITY
}

enum MasteryLevel {
  APPRENTICE
  JOURNEYMAN
  MASTER
  GRANDMASTER
}

# =====================================================
# TYPES - MAKER PROFILE (Phase 1 Schema)
# =====================================================
type MakerProfile {
  # Identity
  userId: ID!
  email: String!
  username: String
  fullName: String
  givenName: String
  familyName: String
  phoneNumber: String
  displayName: String
  publicProfileEnabled: Boolean
  phoneVerified: Boolean
  phoneVerifiedAt: AWSDateTime
  
  # Business Information
  businessName: String
  storeDescription: String
  bio: String
  serviceAreas: [String!]
  businessType: BusinessType
  taxId: String
  
  # Location
  location: Location
  
  # Media
  profileImageUrl: String
  profileImageStatus: String
  profileImageUpdatedAt: AWSDateTime
  bannerImageUrl: String
  bannerImageStatus: String
  bannerImageUpdatedAt: AWSDateTime
  
  # Craft
  primaryCraft: String
  yearsOfExperience: Int
  craftHeritage: CraftHeritageInfo

  # Public contact
  publicEmail: String
  publicPhoneNumber: String
  websiteUrl: String
  instagramUrl: String
  tiktokUrl: String
  facebookUrl: String

  # Policies
  shippingPolicy: String
  customOrderPolicy: String
  cancellationPolicy: String
  
  # Verification
  identityVerificationStatus: VerificationStatus!
  emailVerified: Boolean!
  emailVerifiedAt: AWSDateTime
  
  # Stats (denormalized)
  totalShelfItems: Int!
  activeShelfItems: Int!
  soldShelfItems: Int!
  totalSales: Int!
  totalReviews: Int!
  averageRating: Float
  
  # Operational
  acceptCustomOrders: Boolean!
  acceptRushOrders: Boolean!
  isActive: Boolean!
  isSuspended: Boolean!
  suspendedReason: String

  # Account status
  onboardingComplete: Boolean
  lastLoginAt: AWSDateTime
  marketingOptInAt: AWSDateTime
  termsAcceptedAt: AWSDateTime
  privacyPolicyAcceptedAt: AWSDateTime
  
  # Timestamps
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Location {
  country: String!
  state: String!
  city: String!
  zipCode: String
  timezone: String!
}

type CraftHeritageInfo {
  tradition: String
  techniques: String
  materials: String
  inspiration: String
}

# =====================================================
# TYPES - BUSINESS OPERATIONS
# =====================================================
type BusinessOperations {
  makerUserId: ID!
  weekDate: String!
  
  # Schedule
  workingDaysThisWeek: [Int!]!
  hoursPerDay: HoursPerDay!
  
  # Vacation
  vacationMode: Boolean!
  vacationStartDate: AWSDateTime
  vacationEndDate: AWSDateTime
  
  # Capacity
  currentWorkload: Workload!
  nextAvailableSlot: AWSDateTime
  acceptingCustomOrders: Boolean!
  acceptingRushOrders: Boolean!
  
  # Recurring
  recurringClosures: [RecurringClosure!]
  peakSeasonIndicator: Boolean!
  
  # Timestamps
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type HoursPerDay {
  mon: Int
  tue: Int
  wed: Int
  thu: Int
  fri: Int
  sat: Int
  sun: Int
}

type RecurringClosure {
  dayOfWeek: Int!
  reason: String!
}

# =====================================================
# TYPES - CRAFT HERITAGE
# =====================================================
type CraftHeritage {
  makerUserId: ID!
  heritageId: ID!
  
  # Tradition
  craftTradition: String!
  traditionOrigin: TraditionOrigin!
  
  # Mastery
  masteryLevel: MasteryLevel!
  yearsOfPractice: Int!
  
  # Lineage
  masterArtisan: MasterArtisan
  
  # Technique
  techniqueDetails: TechniqueDetails!
  
  # Certification
  certifyingBodyOrGuild: CertifyingBody
  
  # Teaching
  apprenticesTrained: Int!
  isTeachingOrAcceptingApprentices: Boolean!
  
  # Media
  mediaDocumentation: [MediaDocumentation!]
  
  # Significance
  culturalSignificance: String!
  modernInfluences: [String!]
  
  # Timestamps
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type TraditionOrigin {
  culture: String!
  region: String!
  centuriesOld: Int!
}

type MasterArtisan {
  name: String!
  relationship: String!
  yearsUnder: Int!
}

type TechniqueDetails {
  name: String!
  description: String!
  toolsRequired: [String!]!
  difficultyLevel: Int!
  timeRequiredPerPiece: Int!
  modernAdaptations: String
}

type CertifyingBody {
  name: String!
  certificationDate: AWSDateTime!
  certificationLevel: String!
}

type MediaDocumentation {
  type: String!
  url: String!
  title: String!
}

type CraftHeritageConnection {
  items: [CraftHeritage!]!
  nextToken: String
}

# =====================================================
# TYPES - MAKER VERIFICATION
# =====================================================
type MakerVerificationStatus {
  makerUserId: ID!
  identityVerified: Boolean!
  businessVerified: Boolean!
  proofOfCraftVerified: Boolean!
  overallStatus: VerificationStatus!
  lastUpdated: AWSDateTime!
}

